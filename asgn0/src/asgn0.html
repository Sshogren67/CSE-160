<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a vector (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="asgn0.js"></script>

    <br /><br />

    <label for="x1">V1 X:</label>
    <input type="number" id="x1" value="0" step="0.1" />

    <label for="y1">V1 Y:</label>
    <input type="number" id="y1" value="0" step="0.1" />

    <br /><br />

    <label for="x2">V2 X:</label>
    <input type="number" id="x2" value="0" step="0.1" />

    <label for="y2">V2 Y:</label>
    <input type="number" id="y2" value="0" step="0.1" />

    <br /><br />

    <input type="button" value="Draw" onclick="handleDrawEvent()" />

    <br /><br />

    <label for="operation">Operation:</label>
    <select id="operation">
      <option value="add">Addition</option>
      <option value="sub">Subtraction</option>
      <option value="mul">Multiplication</option>
      <option value="div">Division</option>
      <option value="magnitude">Magnitude</option>
      <option value="normalize">Normalize</option>
      <option value="angle">Angle Between</option>
      <option value="area">Area</option>
    </select>

    <label for="scalar">Scaler:</label>
    <input type="number" id="scalar" value="1" step="0.1" />

    <br /><br />

    <input type="button" value="Draw Operation" onclick="handleDrawOperationEvent()" />

  </body>
</html>
